# info.simbot.app — SimBot tools directory
# Deploy: copy to /etc/nginx/sites-available/, symlink into sites-enabled/,
#         then `nginx -t && systemctl reload nginx`.

# HTTP -> HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name info.simbot.app;

    # Let certbot serve ACME challenges over HTTP
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name info.simbot.app;

    root /var/www/info.simbot.app;
    index tools.html;

    # TLS (certbot-managed)
    ssl_certificate     /etc/letsencrypt/live/info.simbot.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/info.simbot.app/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Serve the static directory; fall back to tools.html
    location / {
        try_files $uri $uri/ /tools.html;
    }

    # Cache static assets
    location ~* \.(?:css|js|png|jpg|jpeg|gif|svg|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    access_log /var/log/nginx/info.simbot.app.access.log;
    error_log  /var/log/nginx/info.simbot.app.error.log;
}
